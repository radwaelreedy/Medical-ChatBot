<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical Chatbot</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
  <div class="chat-header">Chatter box!</div>
  <div class="chat-messages" id="chatMessages">
    <div class="bot-msg">Hello.. I'm listening! Go on..</div>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const messages = document.getElementById("chatMessages");
    const text = input.value.trim();

    if (text === "") return;

    // 1. عرض رسالة المستخدم في الشات
    const userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.textContent = text;
    messages.appendChild(userDiv);
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    try {
        // 2. إرسال السؤال فعلياً لسيرفر الـ Flask عبر الـ /get endpoint
        const response = await fetch("/get", {
            method: "POST",
            headers: { 
                "Content-Type": "application/x-www-form-urlencoded" 
            },
            body: "msg=" + encodeURIComponent(text)
        });

        // 3. استقبال الرد الحقيقي القادم من الـ RAG Chain
        const botReply = await response.text();

        // 4. عرض رد البوت الحقيقي في الشات
        const botDiv = document.createElement("div");
        botDiv.className = "bot-msg";
        botDiv.textContent = botReply;
        messages.appendChild(botDiv);
        messages.scrollTop = messages.scrollHeight;

    } catch (error) {
        console.error("Error communicating with backend:", error);
    }
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
